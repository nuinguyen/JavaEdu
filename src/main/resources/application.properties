spring.application.name=demo

# MySQL (tương ứng database.default từ CodeIgniter)
spring.datasource.url=jdbc:mysql://localhost:3306/shopcodeigniter?useUnicode=true&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT (dùng secret đủ dài, production nên lấy từ biến môi trường)
app.jwt.secret=your-256-bit-secret-key-for-jwt-signing-change-in-production-min-32-chars
app.jwt.cookie-name=token
app.jwt.expiration-ms=86400000
