spring.application.name=demo

# MySQL (tương ứng database.default từ CodeIgniter)
spring.datasource.url=jdbc:mysql://localhost:3306/shopcodeigniter?useUnicode=true&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT (dùng secret đủ dài, production nên lấy từ biến môi trường)
app.jwt.secret=your-256-bit-secret-key-for-jwt-signing-change-in-production-min-32-chars
app.jwt.cookie-name=token
app.jwt.expiration-ms=86400000

# Upload ảnh khóa học (thư mục ngoài project hoặc ./upload)
app.upload.dir=${user.dir}/upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
# Tomcat 10.1+: form có nhiều trường (id, title, description, ...) mỗi trường = 1 part, mặc định 10 part → tăng lên
server.tomcat.max-part-count=50

# Log: xem trong cửa sổ Run/Debug Console của IntelliJ (hoặc terminal khi chạy mvn spring-boot:run)
logging.level.root=INFO
logging.level.com.example.demo=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.Bind=TRACE
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.exception-conversion-word=%wEx
