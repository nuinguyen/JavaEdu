<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/layout :: head(${title})}"></head>
<body>
	<nav th:replace="~{fragments/layout :: nav('mycourses', ${isAdmin})}"></nav>

	<main>
		<div class="container">
			<div class="d-flex justify-content-between align-items-center mb-4">
				<h1 class="page-heading">Khóa học của tôi</h1>
				<a th:href="@{/courses}" class="btn btn-app-outline"><i class="bi bi-journal-bookmark me-1"></i>Xem tất cả khóa học</a>
			</div>

			<div th:if="${#lists.isEmpty(enrollments)}" class="app-card">
				<div class="card-body text-center text-secondary py-5">
					<p>Bạn chưa đăng ký khóa học nào.</p>
					<a th:href="@{/courses}" class="btn btn-app-primary mt-2">Xem khóa học</a>
				</div>
			</div>

			<div th:if="${!#lists.isEmpty(enrollments)}" class="app-table-wrap">
				<table class="table">
					<thead>
						<tr>
							<th>Khóa học</th>
							<th>Giảng viên</th>
							<th>Ngày đăng ký</th>
							<th>Trạng thái</th>
							<th></th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="e : ${enrollments}">
							<td><a th:href="@{/courses/{id}(id=${e.course.id})}" th:text="${e.course.title}" class="text-decoration-none fw-medium"></a></td>
							<td th:text="${e.course.instructor}">GV</td>
							<td th:text="${#temporals.format(e.enrollDate, 'dd/MM/yyyy')}">Ngày</td>
							<td>
								<span th:if="${e.status == 'PENDING'}" class="badge-status bg-warning bg-opacity-25 text-warning">Chờ duyệt</span>
								<span th:if="${e.status == 'APPROVED'}" class="badge-status bg-success bg-opacity-25 text-success">Đã duyệt</span>
							</td>
							<td><a th:href="@{/courses/{id}(id=${e.course.id})}" class="btn btn-sm btn-app-outline">Xem</a></td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>
	</main>

	<footer th:replace="~{fragments/layout :: footer}"></footer>
	<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
