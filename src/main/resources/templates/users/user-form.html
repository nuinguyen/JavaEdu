<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${title}">Thêm / Sửa User</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
	<div class="wrap">
		<nav>
			<a href="/" class="logo">Demo<span>.</span>Web</a>
			<ul>
				<li><a href="/">Trang chủ</a></li>
				<li><a href="/about">Giới thiệu</a></li>
				<li><a href="/users" class="active">Danh sách User</a></li>
				<li><a href="/courses">Khóa học</a></li>
			</ul>
		</nav>

		<main>
			<h1 class="page-title" th:text="${title}">Thêm User</h1>

			<form th:action="@{/users/save}" th:object="${user}" method="post" class="form-card">
				<input type="hidden" th:field="*{id}">
				<div class="form-group">
					<label for="name">Họ tên <span class="required">*</span></label>
					<input type="text" th:field="*{name}" class="form-input" required placeholder="Nhập họ tên">
					<div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
				</div>
				<div class="form-group">
					<label for="username">Tên đăng nhập <span class="required">*</span></label>
					<input type="text" th:field="*{username}" class="form-input" required placeholder="Tên đăng nhập (3–50 ký tự)">
					<div class="error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
				</div>
				<div class="form-group">
					<label for="password">Mật khẩu <span th:if="${user.id == null}" class="required">*</span></label>
					<input type="password" th:field="*{password}" class="form-input" placeholder="Để trống nếu không đổi (khi sửa)">
					<div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
				</div>
				<div class="form-group">
					<label for="email">Email</label>
					<input type="email" th:field="*{email}" class="form-input" placeholder="email@example.com">
					<div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
				</div>
				<div class="form-group">
					<label for="role">Vai trò</label>
					<select th:field="*{role}" class="form-input">
						<option value="ROLE_USER">User</option>
						<option value="ROLE_ADMIN">Admin</option>
					</select>
				</div>
				<div class="form-group">
					<label for="active">Trạng thái</label>
					<label style="display: flex; align-items: center; gap: 0.5rem;">
						<input type="checkbox" th:field="*{active}">
						<span>Đang hoạt động</span>
					</label>
				</div>
				<div class="form-actions"> 
					<button type="submit" class="btn">Lưu</button>
					<a th:href="@{/users}" class="btn btn-outline">Hủy</a>
				</div>
			</form>
		</main>

		<footer>
			<p>Demo Web · Spring Boot 4 · Java 25</p>
		</footer>
	</div>
</body>
</html>
