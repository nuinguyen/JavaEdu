<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/admin-layout :: head(${title})}"></head>
<body>
  <div th:replace="~{fragments/admin-layout :: overlay}"></div>
  <div th:replace="~{fragments/admin-layout :: sidebar('users')}"></div>

  <div id="main">
    <div th:replace="~{fragments/admin-layout :: topbar(${title})}"></div>
    <div class="content">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          <div class="chart-card">
            <div class="sec-title mb-3" th:text="${title}">Thêm User</div>
            <div th:if="${saveError}" class="alert alert-admin-danger py-2 small mb-3" th:text="${saveError}"></div>
            <form th:action="@{/users/save}" th:object="${user}" method="post">
              <input type="hidden" th:field="*{id}">
              <div class="mb-3">
                <label for="name" class="form-label admin-label">Họ tên <span style="color:var(--accent2)">*</span></label>
                <input type="text" th:field="*{name}" class="form-control admin-input" required placeholder="Nhập họ tên">
                <div class="form-text" style="color:var(--accent2)" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
              </div>
              <div class="mb-3">
                <label for="username" class="form-label admin-label">Tên đăng nhập <span style="color:var(--accent2)">*</span></label>
                <input type="text" th:field="*{username}" class="form-control admin-input" required placeholder="3–50 ký tự">
                <div class="form-text" style="color:var(--accent2)" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
              </div>
              <div class="mb-3">
                <label for="password" class="form-label admin-label">Mật khẩu <span th:if="${user.id == null}" style="color:var(--accent2)">*</span></label>
                <input type="password" th:field="*{password}" class="form-control admin-input" placeholder="Để trống nếu không đổi (khi sửa)">
                <div class="form-text" style="color:var(--accent2)" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
              </div>
              <div class="mb-3">
                <label for="email" class="form-label admin-label">Email</label>
                <input type="email" th:field="*{email}" class="form-control admin-input" placeholder="email@example.com">
                <div class="form-text" style="color:var(--accent2)" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
              </div>
              <div class="mb-3">
                <label for="role" class="form-label admin-label">Vai trò</label>
                <select th:field="*{role}" class="form-select admin-input">
                  <option value="ROLE_USER">User</option>
                  <option value="ROLE_ADMIN">Admin</option>
                </select>
              </div>
              <div class="mb-4">
                <div class="form-check">
                  <input type="checkbox" th:field="*{active}" class="form-check-input" id="active" style="accent-color:var(--accent)">
                  <label class="form-check-label admin-label" for="active">Đang hoạt động</label>
                </div>
              </div>
              <div class="d-flex gap-2">
                <button type="submit" class="admin-btn-primary">Lưu</button>
                <a th:href="@{/users}" class="admin-btn-outline">Hủy</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div th:replace="~{fragments/admin-layout :: scripts}"></div>
</body>
</html>
