<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${title}">Danh sách User</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
	<div class="wrap">
		<nav>
			<a href="/" class="logo">Demo<span>.</span>Web</a>
			<ul>
				<li><a href="/">Trang chủ</a></li>
				<li><a href="/about">Giới thiệu</a></li>
				<li><a href="/users" class="active">Danh sách User</a></li>
				<li><a href="/courses">Khóa học</a></li>
			</ul>
		</nav>

		<main>
			<div class="page-header">
				<h1 class="page-title">Danh sách User</h1>
				<a th:href="@{/users/new}" class="btn">+ Thêm user</a>
			</div>

			<div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

			<form th:action="@{/users}" method="get" class="search-form">
				<input type="text" name="q" th:value="${searchKeyword}" placeholder="Tìm theo tên hoặc email..." class="form-input">
				<button type="submit" class="btn">Tìm kiếm</button>
			</form>

			<div th:if="${#lists.isEmpty(users)}" class="empty-state">
				<p th:if="${searchKeyword != null && !#strings.isEmpty(searchKeyword)}">Không tìm thấy user nào phù hợp với "<span th:text="${searchKeyword}"></span>".</p>
				<p th:unless="${searchKeyword != null && !#strings.isEmpty(searchKeyword)}">Chưa có user nào. <a th:href="@{/users/new}">Thêm user</a> để bắt đầu.</p>
			</div>

			<div th:if="${!#lists.isEmpty(users)}" class="table-wrap">
				<table class="user-table">
					<thead>
						<tr>
							<th>ID</th>
							<th>Họ tên</th>
							<th>Email</th>
							<th>Thao tác</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="user : ${users}">
							<td th:text="${user.id}">1</td>
							<td th:text="${user.name}">Tên</td>
							<td th:text="${user.email}">email@example.com</td>
							<td class="actions">
								<a th:href="@{/users/{id}/edit(id=${user.id})}" class="btn btn-sm btn-outline">Sửa</a>
								<form th:action="@{/users/{id}/delete(id=${user.id})}" method="post" class="inline-form" onsubmit="return confirm('Bạn có chắc muốn xóa user này?');">
									<button type="submit" class="btn btn-sm btn-danger">Xóa</button>
								</form>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</main>

		<footer>
			<p>Demo Web · Spring Boot 4 · Java 25</p>
		</footer>
	</div>
</body>
</html>
