<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:fragment="head(title)">
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${title}">Demo</title>
	<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
	<style>
		:root {
			--app-font: 'Plus Jakarta Sans', system-ui, sans-serif;
			--app-primary: #4f46e5;
			--app-primary-dark: #4338ca;
			--app-accent: #f59e0b;
			--app-surface: #ffffff;
			--app-bg: #f1f5f9;
			--app-border: #e2e8f0;
			--app-text: #0f172a;
			--app-muted: #64748b;
			--radius: 12px;
			--radius-lg: 16px;
			--shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
			--shadow-md: 0 4px 6px -1px rgba(0,0,0,.07), 0 2px 4px -2px rgba(0,0,0,.05);
			--shadow-lg: 0 10px 15px -3px rgba(0,0,0,.06), 0 4px 6px -4px rgba(0,0,0,.04);
		}
		body {
			font-family: var(--app-font);
			background: var(--app-bg);
			color: var(--app-text);
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			font-size: 0.9375rem;
		}
		main { flex: 1; padding: 2rem 0 3rem; }
		.app-navbar {
			background: var(--app-surface) !important;
			box-shadow: var(--shadow);
			padding: 0.5rem 0;
		}
		.app-navbar .navbar-brand {
			font-weight: 700;
			font-size: 1.25rem;
			color: var(--app-text) !important;
		}
		.app-navbar .navbar-brand span { color: var(--app-primary); }
		.app-navbar .nav-link {
			color: var(--app-muted) !important;
			font-weight: 500;
			padding: 0.5rem 0.75rem !important;
			border-radius: 8px;
			transition: color .15s, background .15s;
		}
		.app-navbar .nav-link:hover { color: var(--app-primary) !important; background: rgba(79,70,229,.08); }
		.app-navbar .nav-link.active {
			color: var(--app-primary) !important;
			background: rgba(79,70,229,.1);
		}
		.app-card {
			background: var(--app-surface);
			border: none;
			border-radius: var(--radius-lg);
			box-shadow: var(--shadow);
			overflow: hidden;
		}
		.app-card .card-body { padding: 1.5rem 1.5rem; }
		.app-table-wrap {
			background: var(--app-surface);
			border-radius: var(--radius-lg);
			box-shadow: var(--shadow);
			overflow: hidden;
		}
		.app-table-wrap .table {
			margin-bottom: 0;
			--bs-table-bg: transparent;
		}
		.app-table-wrap .table thead th {
			background: #f8fafc;
			color: var(--app-muted);
			font-weight: 600;
			font-size: 0.75rem;
			text-transform: uppercase;
			letter-spacing: .04em;
			padding: 0.875rem 1rem;
			border-bottom: 1px solid var(--app-border);
		}
		.app-table-wrap .table tbody td {
			padding: 0.875rem 1rem;
			vertical-align: middle;
			border-bottom: 1px solid var(--app-border);
		}
		.app-table-wrap .table tbody tr:last-child td { border-bottom: 0; }
		.app-table-wrap .table tbody tr:hover td { background: #f8fafc; }
		.btn-app-primary {
			background: var(--app-primary);
			color: #fff;
			border: none;
			font-weight: 600;
			padding: 0.5rem 1rem;
			border-radius: 8px;
			transition: background .15s, transform .05s;
		}
		.btn-app-primary:hover { background: var(--app-primary-dark); color: #fff; }
		.btn-app-primary:active { transform: scale(0.98); }
		.btn-app-outline {
			background: transparent;
			color: var(--app-primary);
			border: 1.5px solid var(--app-primary);
			font-weight: 600;
			padding: 0.5rem 1rem;
			border-radius: 8px;
			transition: background .15s, color .15s;
		}
		.btn-app-outline:hover { background: rgba(79,70,229,.1); color: var(--app-primary-dark); }
		.app-hero {
			background: linear-gradient(135deg, var(--app-primary) 0%, #6366f1 100%);
			border-radius: var(--radius-lg);
			color: #fff;
			padding: 2.5rem;
			margin-bottom: 2rem;
			box-shadow: 0 4px 14px rgba(79,70,229,.35);
		}
		.app-hero .lead { opacity: .95; }
		.app-feature-card {
			background: var(--app-surface);
			border: 1px solid var(--app-border);
			border-radius: var(--radius-lg);
			padding: 1.5rem;
			height: 100%;
			transition: box-shadow .2s, border-color .2s;
		}
		.app-feature-card:hover {
			box-shadow: var(--shadow-md);
			border-color: rgba(79,70,229,.2);
		}
		.app-feature-card .icon-wrap {
			width: 48px;
			height: 48px;
			border-radius: 12px;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 1.25rem;
			margin-bottom: 1rem;
		}
		.app-footer {
			background: var(--app-surface);
			border-top: 1px solid var(--app-border);
			color: var(--app-muted);
			font-size: 0.8125rem;
			padding: 1rem 0;
			margin-top: auto;
		}
		.badge-status { font-weight: 500; padding: 0.35em 0.65em; border-radius: 6px; }
		.page-heading { font-weight: 700; color: var(--app-text); margin-bottom: 0; }
		.form-control:focus, .form-select:focus { border-color: var(--app-primary); box-shadow: 0 0 0 3px rgba(79,70,229,.15); }
		.alert { border: none; border-radius: 8px; }
	</style>
</head>
<body>
	<nav th:fragment="nav(activePage, isAdmin)" class="navbar navbar-expand-lg navbar-light app-navbar sticky-top">
		<div class="container">
			<a class="navbar-brand" href="/">Demo<span>.</span>Web</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarNav">
				<ul class="navbar-nav ms-auto gap-1">
					<li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'home'} ? 'active' : ''" href="/"><i class="bi bi-house me-1"></i>Trang chủ</a></li>
					<li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'about'} ? 'active' : ''" href="/about"><i class="bi bi-info-circle me-1"></i>Giới thiệu</a></li>
					<li class="nav-item" th:if="${isAdmin}"><a class="nav-link" th:classappend="${activePage == 'users'} ? 'active' : ''" href="/users"><i class="bi bi-people me-1"></i>User</a></li>
					<li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'courses'} ? 'active' : ''" href="/courses"><i class="bi bi-journal-bookmark me-1"></i>Khóa học</a></li>
					<li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'catalog'} ? 'active' : ''" href="/catalog"><i class="bi bi-pencil-square me-1"></i>Đăng ký khóa học</a></li>
					<li class="nav-item"><a class="nav-link" th:classappend="${activePage == 'mycourses'} ? 'active' : ''" href="/my-courses"><i class="bi bi-bookmark-star me-1"></i>Khóa học của tôi</a></li>
					<li class="nav-item" th:if="${isAdmin}"><a class="nav-link" th:classappend="${activePage == 'enrollments'} ? 'active' : ''" href="/enrollments"><i class="bi bi-clipboard-check me-1"></i>Đăng ký</a></li>
					<li class="nav-item"><a class="nav-link" href="/logout"><i class="bi bi-box-arrow-right me-1"></i>Đăng xuất</a></li>
				</ul>
			</div>
		</div>
	</nav>

	<footer th:fragment="footer" class="app-footer">
		<div class="container text-center">
			Demo Web · Spring Boot 4 · Java 25
		</div>
	</footer>

	<div th:fragment="scripts" id="scripts">
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	</div>
</body>
</html>
