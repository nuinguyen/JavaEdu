<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:fragment="head(title)">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${title}">DevAcademy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #07080f;
      --surface: #0f1120;
      --card: #13152a;
      --border: rgba(255,255,255,.07);
      --accent: #5b6ef5;
      --a2: #f55b9b;
      --a3: #5bf5b0;
      --a4: #f5c55b;
      --text: #e2e5f5;
      --muted: #5e6480;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::after {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.035'/%3E%3C/svg%3E");
    }
    main { flex: 1; padding: 2rem 0 3rem; position: relative; z-index: 1; }

    /* Nav */
    .navbar {
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(14px);
      position: sticky; top: 0; z-index: 200;
    }
    .navbar-brand { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 800; color: var(--text) !important; letter-spacing: -.02em; }
    .navbar-brand span { color: var(--accent); }
    .nav-link { color: var(--muted) !important; font-size: .88rem; transition: color .2s; }
    .nav-link:hover, .nav-link.active { color: var(--text) !important; }
    .btn-nav {
      background: var(--accent); color: #fff !important;
      padding: .42rem 1.15rem !important; border-radius: 7px;
      font-size: .85rem; font-weight: 600;
      transition: opacity .2s, transform .2s;
    }
    .btn-nav:hover { opacity: .85; transform: translateY(-1px); }

    /* Cards & content */
    .app-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      position: relative; z-index: 1;
    }
    .app-card .card-body { padding: 1.5rem; }
    .app-table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      position: relative; z-index: 1;
    }
    .app-table-wrap .table { margin-bottom: 0; --bs-table-bg: transparent; color: var(--text); }
    .app-table-wrap .table thead th {
      background: rgba(255,255,255,.04);
      color: var(--muted); font-weight: 600; font-size: .75rem;
      text-transform: uppercase; letter-spacing: .04em;
      padding: .875rem 1rem; border-bottom: 1px solid var(--border);
    }
    .app-table-wrap .table tbody td {
      padding: .875rem 1rem; vertical-align: middle;
      border-bottom: 1px solid var(--border);
    }
    .app-table-wrap .table tbody tr:last-child td { border-bottom: 0; }
    .app-table-wrap .table tbody tr:hover td { background: rgba(255,255,255,.03); }

    /* Buttons */
    .btn-app-primary {
      background: var(--accent);
      color: #fff;
      border: none;
      font-weight: 600;
      padding: .5rem 1rem;
      border-radius: 8px;
      transition: opacity .2s, transform .05s;
    }
    .btn-app-primary:hover { opacity: .9; color: #fff; }
    .btn-app-primary:active { transform: scale(0.98); }
    .btn-app-outline {
      background: transparent;
      color: var(--accent);
      border: 1.5px solid var(--accent);
      font-weight: 600;
      padding: .5rem 1rem;
      border-radius: 8px;
      transition: background .2s, color .2s;
    }
    .btn-app-outline:hover { background: rgba(91,110,245,.15); color: var(--text); }

    /* Form */
    .form-control, .form-select {
      background: rgba(255,255,255,.05);
      border: 1px solid var(--border);
      color: var(--text);
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91,110,245,.2);
    }
    .form-control::placeholder { color: var(--muted); }
    .form-label { color: var(--text); }

    /* Alerts */
    .alert { border: none; border-radius: 10px; }
    .alert-danger { background: rgba(245,91,155,.15); color: #f5a3c4; }
    .alert-success { background: rgba(91,247,176,.12); color: var(--a3); }
    .alert-info { background: rgba(91,110,245,.15); color: #a5b8f8; }
    .alert-warning { background: rgba(245,197,91,.15); color: var(--a4); }
    .alert-secondary { background: rgba(255,255,255,.06); color: var(--muted); }
    .alert-link { color: var(--accent) !important; }

    /* Misc */
    .page-heading { font-family: 'Syne', sans-serif; font-weight: 700; color: var(--text); margin-bottom: 0; }
    .text-secondary { color: var(--muted) !important; }
    .text-primary { color: var(--accent) !important; }
    .bg-light { background: rgba(255,255,255,.05) !important; }
    .badge-status { font-weight: 500; padding: .35em .65em; border-radius: 6px; }
    .app-footer {
      border-top: 1px solid var(--border);
      padding: 2rem 0;
      text-align: center;
      color: var(--muted);
      font-size: .8rem;
      position: relative; z-index: 1;
    }
  </style>
</head>
<body>
  <nav th:fragment="nav(activePage, isAdmin)" class="navbar navbar-expand-lg" style="background:rgba(7,8,15,.92)">
    <div class="container">
      <a class="navbar-brand" th:href="@{/}">dev<span>Academy</span></a>
      <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" style="color:var(--muted)">
        <i class="bi bi-list fs-4"></i>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1 py-2 py-lg-0">
          <li class="nav-item"><a class="nav-link px-3" th:classappend="${activePage == 'home'} ? 'active' : ''" th:href="@{/}">Trang chủ</a></li>
          <li class="nav-item"><a class="nav-link px-3" th:classappend="${activePage == 'catalog' || activePage == 'courses'} ? 'active' : ''" th:href="@{/catalog}">Khóa học</a></li>
          <li class="nav-item"><a class="nav-link px-3" th:classappend="${activePage == 'mycourses'} ? 'active' : ''" th:href="@{/my-courses}">Của tôi</a></li>
          <li th:if="${isAdmin}" class="nav-item"><a class="nav-link px-3" th:classappend="${activePage == 'users' || activePage == 'enrollments'} ? 'active' : ''" th:href="@{/admin/courses}">Quản lý</a></li>
          <li class="nav-item ms-lg-2">
            <a class="nav-link btn-nav" th:href="@{/logout}">Đăng xuất</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <footer th:fragment="footer" class="app-footer">
    <div class="container">
      <p class="mb-0">© 2025 devAcademy · Thiết kế với ♥ tại Hà Nội</p>
    </div>
  </footer>

  <div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </div>
</body>
</html>
