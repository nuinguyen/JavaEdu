<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head th:replace="~{fragments/layout :: head(${title})}"></head>
<body>
	<nav th:replace="~{fragments/layout :: nav('login', false)}"></nav>

	<main>
		<div class="container">
			<div class="row justify-content-center">
				<div class="col-md-5 col-lg-4">
					<div class="app-card">
						<div class="card-body p-4">
							<h2 class="page-heading mb-4">Đăng nhập</h2>

							<div th:if="${param.error}" class="alert alert-danger py-2 small mb-3">
								Tên đăng nhập hoặc mật khẩu không đúng.
							</div>

							<form th:action="@{/login}" method="post">
								<div class="mb-3">
									<label for="username" class="form-label fw-semibold">Tên đăng nhập</label>
									<input type="text" id="username" name="username" class="form-control" required placeholder="Nhập tên đăng nhập" autofocus>
								</div>
								<div class="mb-4">
									<label for="password" class="form-label fw-semibold">Mật khẩu</label>
									<input type="password" id="password" name="password" class="form-control" required placeholder="Nhập mật khẩu">
								</div>
								<button type="submit" class="btn btn-app-primary w-100">Đăng nhập</button>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
	</main>

	<footer th:replace="~{fragments/layout :: footer}"></footer>
	<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
