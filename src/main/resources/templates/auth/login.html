<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${title}">Đăng nhập</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
	<div class="wrap">
		<nav>
			<a href="/" class="logo">Demo<span>.</span>Web</a>
			<ul>
				<li><a href="/login" class="active">Đăng nhập</a></li>
			</ul>
		</nav>

		<main>
			<h1 class="page-title">Đăng nhập</h1>

			<div th:if="${param.error}" class="alert alert-danger">
				Tên đăng nhập hoặc mật khẩu không đúng.
			</div>

			<form th:action="@{/login}" method="post" class="form-card" style="max-width: 400px;">
				<div class="form-group">
					<label for="username">Tên đăng nhập</label>
					<input type="text" id="username" name="username" class="form-input" required
						   placeholder="Nhập tên đăng nhập" autofocus>
				</div>
				<div class="form-group">
					<label for="password">Mật khẩu</label>
					<input type="password" id="password" name="password" class="form-input" required
						   placeholder="Nhập mật khẩu">
				</div>
				<div class="form-actions">
					<button type="submit" class="btn">Đăng nhập</button>
				</div>
			</form>
		</main>

		<footer>
			<p>Demo Web · Spring Boot 4 · Java 25</p>
		</footer>
	</div>
</body>
</html>
