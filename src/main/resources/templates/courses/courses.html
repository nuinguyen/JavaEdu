<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${title}">Danh sách khóa học</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
	<div class="wrap">
		<nav>
			<a href="/" class="logo">Demo<span>.</span>Web</a>
			<ul>
				<li><a href="/">Trang chủ</a></li>
				<li><a href="/about">Giới thiệu</a></li>
				<li><a href="/users">Danh sách User</a></li>
				<li><a href="/courses" class="active">Khóa học</a></li>
			</ul>
		</nav>

		<main>
			<div class="page-header">
				<h1 class="page-title">Danh sách khóa học</h1>
				<a th:href="@{/courses/new}" class="btn">+ Thêm khóa học</a>
			</div>

			<div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

			<div th:if="${#lists.isEmpty(courses)}" class="empty-state">
				<p>Chưa có khóa học nào. <a th:href="@{/courses/new}">Thêm khóa học</a> để bắt đầu.</p>
			</div>

			<div th:if="${!#lists.isEmpty(courses)}" class="table-wrap">
				<table class="user-table">
					<thead>
						<tr>
							<th>ID</th>
							<th>Tiêu đề</th>
							<th>Giảng viên</th>
							<th>Sĩ số tối đa</th>
							<th>Thao tác</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="course : ${courses}">
							<td th:text="${course.id}">1</td>
							<td th:text="${course.title}">Tiêu đề</td>
							<td th:text="${course.instructor}">Giảng viên</td>
							<td th:text="${course.maxStudents}">30</td>
							<td class="actions">
								<a th:href="@{/courses/{id}/edit(id=${course.id})}" class="btn btn-sm btn-outline">Sửa</a>
								<form th:action="@{/courses/{id}/delete(id=${course.id})}" method="post" class="inline-form" onsubmit="return confirm('Bạn có chắc muốn xóa khóa học này?');">
									<button type="submit" class="btn btn-sm btn-danger">Xóa</button>
								</form>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</main>

		<footer>
			<p>Demo Web · Spring Boot 4 · Java 25</p>
		</footer>
	</div>
</body>
</html>
