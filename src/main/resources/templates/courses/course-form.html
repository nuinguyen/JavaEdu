<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${title}">Thêm / Sửa khóa học</title>
	<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
	<div class="wrap">
		<nav>
			<a href="/" class="logo">Demo<span>.</span>Web</a>
			<ul>
				<li><a href="/">Trang chủ</a></li>
				<li><a href="/about">Giới thiệu</a></li>
				<li><a href="/users">Danh sách User</a></li>
				<li><a href="/courses" class="active">Khóa học</a></li>
			</ul>
		</nav>

		<main>
			<h1 class="page-title" th:text="${title}">Thêm khóa học</h1>

			<form th:action="@{/courses/save}" th:object="${course}" method="post" class="form-card">
				<input type="hidden" th:field="*{id}">

				<div class="form-group">
					<label for="title">Tiêu đề khóa học <span class="required">*</span></label>
					<input type="text" th:field="*{title}" class="form-input" required placeholder="Nhập tiêu đề khóa học">
					<div class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
				</div>

				<div class="form-group">
					<label for="description">Mô tả</label>
					<textarea th:field="*{description}" class="form-input" rows="4" placeholder="Mô tả nội dung khóa học"></textarea>
					<div class="error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
				</div>

				<div class="form-group">
					<label for="instructor">Giảng viên <span class="required">*</span></label>
					<input type="text" th:field="*{instructor}" class="form-input" required placeholder="Tên giảng viên">
					<div class="error" th:if="${#fields.hasErrors('instructor')}" th:errors="*{instructor}"></div>
				</div>

				<div class="form-group">
					<label for="maxStudents">Sĩ số tối đa <span class="required">*</span></label>
					<input type="number" th:field="*{maxStudents}" class="form-input" min="1" max="500" required placeholder="Ví dụ: 30">
					<div class="error" th:if="${#fields.hasErrors('maxStudents')}" th:errors="*{maxStudents}"></div>
				</div>

				<div class="form-actions">
					<button type="submit" class="btn">Lưu</button>
					<a th:href="@{/courses}" class="btn btn-outline">Hủy</a>
				</div>
			</form>
		</main>

		<footer>
			<p>Demo Web · Spring Boot 4 · Java 25</p>
		</footer>
	</div>
</body>
</html>
